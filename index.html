<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Digital Textbook</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- MathJax for equation rendering -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>
    <!-- Main Tab Navigation -->
    <div class="main-tabs">
        <button class="main-tab active" data-view="textbook">Textbook</button>
        <button class="main-tab" data-view="monster">Physics Monster</button>
    </div>

    <!-- Textbook View -->
    <div class="view-container" id="textbook-view">
        <div class="container">
            <!-- Left Sidebar Navigation -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h1>Physics Textbook</h1>
                    <p class="subtitle">Interactive Learning</p>
                </div>
                <nav class="table-of-contents" id="navigation">
                    <!-- Navigation will be dynamically generated -->
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="content-area">
                <div class="content-wrapper" id="content">
                    <!-- Content will be dynamically loaded -->
                    <div class="welcome">
                        <h1>Welcome to Physics</h1>
                        <p>Select a topic from the left sidebar to begin your journey into the fascinating world of physics.</p>
                    </div>
                </div>
            </main>

            <!-- Right Panel - Conceptual Questions -->
            <aside class="questions-panel" id="questions-panel">
                <div class="questions-header">
                    <h2>Think About It</h2>
                    <p class="questions-subtitle">Conceptual Questions</p>
                </div>
                <div class="questions-content" id="questions">
                    <!-- Questions will be dynamically loaded -->
                    <p class="questions-placeholder">Select a section to see conceptual questions</p>
                </div>
            </aside>
        </div>
    </div>

    <!-- Question Bank Mode (Physics Monster) -->
    <div class="view-container question-bank-mode" id="monster-view" style="display: none; background: linear-gradient(135deg, #0a0014 0%, #1a0028 50%, #0a0014 100%) !important;">
        <div class="qb-container">
            <!-- Left Sidebar with Topics and Progress -->
            <aside class="qb-sidebar" id="qb-sidebar">
                <div class="qb-sidebar-header">
                    <h2>Become a Physics Monster</h2>
                    <p class="qb-sidebar-subtitle">Practice Problems</p>
                </div>
                <nav class="qb-topics" id="qb-topics">
                    <!-- Topics with progress rings will be dynamically generated -->
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="qb-main">
                <!-- Top Filters -->
                <div class="qb-filters" id="qb-filters">
                    <select id="filter-status" class="qb-filter-select">
                        <option value="all">All Status</option>
                        <option value="completed">Completed</option>
                        <option value="incomplete">Incomplete</option>
                    </select>
                    <select id="filter-paper" class="qb-filter-select">
                        <option value="all">All Papers</option>
                        <option value="Paper 1">Paper 1</option>
                        <option value="Paper 2">Paper 2</option>
                    </select>
                    <select id="filter-level" class="qb-filter-select">
                        <option value="all">All Levels</option>
                        <option value="SL">SL</option>
                        <option value="HL">HL</option>
                    </select>
                </div>

                <!-- Question Cards Container -->
                <div class="qb-questions" id="qb-questions">
                    <!-- Question cards will be dynamically generated -->
                </div>
            </main>
        </div>
    </div>

    <!-- Derivation Modal -->
    <div id="derivation-modal" class="derivation-modal">
        <div class="derivation-content">
            <span class="derivation-close" onclick="closeDerivationModal()">✕</span>
            <div id="derivation-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
